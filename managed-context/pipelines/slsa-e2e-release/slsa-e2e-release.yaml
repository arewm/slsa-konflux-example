# Customized from https://github.com/konflux-ci/release-service-catalog/tree/development/pipelines/managed/push-to-external-registry
---
apiVersion: tekton.dev/v1
kind: Pipeline
metadata:
  name: slsa-e2e-release
  annotations:
    tekton.dev/pipelines.minVersion: "0.12.1"
    tekton.dev/tags: release
spec:
  description: |-
    Tekton pipeline to release Snapshots to an external registry.

    This is a simple release pipeline to illustrate performing privileged operations after verifying a Snapshot. A majority of
    its tasks come from https://github.com/konflux-ci/release-service-catalog.git.

    IMPORTANT: You need to set the `ociStorage` parameter to an OCI repository where the managed pipeline has permissions to store
    intermediate artifacts.
  params:
    - name: release
      type: string
      description:
        The namespaced name (namespace/name) of the Release custom resource initiating this pipeline execution
    - name: releasePlan
      type: string
      description: The namespaced name (namespace/name) of the releasePlan
    - name: releasePlanAdmission
      type: string
      description: The namespaced name (namespace/name) of the releasePlanAdmission
    - name: releaseServiceConfig
      type: string
      description: The namespaced name (namespace/name) of the releaseServiceConfig
    - name: snapshot
      type: string
      description: The namespaced name (namespace/name) of the snapshot
    - name: enterpriseContractPolicy
      type: string
      description: JSON representation of the EnterpriseContractPolicy
    - name: enterpriseContractExtraRuleData
      type: string
      description: |
        Extra rule data to be merged into the policy specified in params.enterpriseContractPolicy. Use syntax
        "key1=value1,key2=value2..."
      default: "pipeline_intention=release"
    - name: verify_ec_task_git_url
      type: string
      description: The git url to the repo where the verify-conforma task is stored
      # Currently unused - verify-conforma taskRef is hardcoded. Will be needed after upstream fix lands.
      # TODO: revert to https://github.com/conforma/cli after upstream fix lands
      default: https://github.com/arewm/slsa-konflux-example
    - name: verify_ec_task_git_revision
      type: string
      description: The git revision to be used when consuming the verify-conforma task
      # Currently unused - verify-conforma taskRef is hardcoded. Will be needed after upstream fix lands.
      default: main
    - name: taskGitUrl
      type: string
      description: The url to the git repo where the release-service-catalog tasks to be used are stored
      default: https://github.com/konflux-ci/release-service-catalog.git
    - name: taskGitRevision
      type: string
      description: >-
        The git revision for tasks from the pipeline's own repo.
        Injected by the release service from the pipeline's pipelineRef resolver params.
      default: main
    # The release service does not allow ociStorage to be set from the RPA, so customize this value in our local fork when running the e2e demo.
    # The serviceAccount running the release pipelineRun will need to have access to push to this registry.
    - name: ociStorage
      type: string
      description: The OCI repository where the Trusted Artifacts are stored
      default: "registry-service.kind-registry/trusted-artifacts"
    - name: orasOptions
      description: oras options to pass to Trusted Artifacts calls
      type: string
      default: "--insecure"
    - name: trustedArtifactsDebug
      description: Flag to enable debug logging in trusted artifacts. Set to a non-empty string to enable
      type: string
      default: "true"
    - name: dataDir
      description: The location where data will be stored
      type: string
      # to avoid tar extraction errors, we need to specify a subdirectory
      # inside the volume.
      default: "/var/workdir/release"
    - name: baseImageBuilderId
      description: Expected builder ID in base image provenance for dependency level verification
      type: string
      default: "https://tekton.dev/chains/v2"
    - name: rekorHost
      description: Rekor transparency log URL for keyless signature verification.
      type: string
      default: "http://rekor-server.rekor-system.svc.cluster.local"
    - name: tufMirror
      description: TUF mirror URL for fetching Sigstore trust roots.
      type: string
      default: "http://tuf-server.tuf-system.svc.cluster.local"
    - name: certificateIdentity
      description: >-
        Certificate identity (URI SAN) for keyless verification of Tekton
        Chains signatures.
      type: string
      default: "https://kubernetes.io/namespaces/tekton-pipelines/serviceaccounts/tekton-chains-controller"
    - name: certificateOidcIssuer
      description: OIDC issuer URL for keyless verification.
      type: string
      default: "https://kubernetes.default.svc"
  tasks:
    - name: verify-access-to-resources
      taskRef:
        resolver: "git"
        params:
          - name: url
            value: https://github.com/konflux-ci/release-service-catalog
          - name: revision
            value: "37605e1fe41aae2794cd853e05f65dd52f3b4307"  # release-service-catalog development branch, pinned
          - name: pathInRepo
            value: tasks/managed/verify-access-to-resources/verify-access-to-resources.yaml
      params:
        - name: release
          value: $(params.release)
        - name: releasePlan
          value: $(params.releasePlan)
        - name: releasePlanAdmission
          value: $(params.releasePlanAdmission)
        - name: releaseServiceConfig
          value: $(params.releaseServiceConfig)
        - name: snapshot
          value: $(params.snapshot)
        - name: requireInternalServices
          value: "false"
        - name: orasOptions
          value: $(params.orasOptions)
    - name: collect-data
      taskRef:
        resolver: "git"
        params:
          - name: url
            value: https://github.com/konflux-ci/release-service-catalog
          - name: revision
            value: "37605e1fe41aae2794cd853e05f65dd52f3b4307"  # release-service-catalog development branch, pinned
          - name: pathInRepo
            value: tasks/managed/collect-data/collect-data.yaml
      params:
        - name: release
          value: $(params.release)
        - name: releasePlan
          value: $(params.releasePlan)
        - name: releasePlanAdmission
          value: $(params.releasePlanAdmission)
        - name: releaseServiceConfig
          value: $(params.releaseServiceConfig)
        - name: snapshot
          value: $(params.snapshot)
        - name: subdirectory
          value: $(context.pipelineRun.uid)
        - name: ociStorage
          value: $(params.ociStorage)
        - name: dataDir
          value: $(params.dataDir)
        - name: trustedArtifactsDebug
          value: "$(params.trustedArtifactsDebug)"
        - name: taskGitUrl
          value: "https://github.com/konflux-ci/release-service-catalog"
        - name: taskGitRevision
          value: "37605e1fe41aae2794cd853e05f65dd52f3b4307"  # release-service-catalog development branch, pinned
        - name: orasOptions
          value: $(params.orasOptions)
      runAfter:
        - verify-access-to-resources
    - name: collect-task-params
      taskRef:
        resolver: "git"
        params:
          - name: url
            value: https://github.com/konflux-ci/release-service-catalog
          - name: revision
            value: "37605e1fe41aae2794cd853e05f65dd52f3b4307"  # release-service-catalog development branch, pinned
          - name: pathInRepo
            value: tasks/managed/collect-task-params/collect-task-params.yaml
      params:
        - name: dataDir
          value: "$(params.dataDir)"
        - name: dataPath
          value: "$(tasks.collect-data.results.data)"
        - name: keysToExtract
          value: |
            [
              {"resultIndex": 0, "key": ".conforma.workerCount", "default": "4"},
              {"resultIndex": 1, "key": ".conforma.timeout", "default": "8h0m0s"}
            ]
        - name: taskGitUrl
          value: "https://github.com/konflux-ci/release-service-catalog"
        - name: taskGitRevision
          value: "37605e1fe41aae2794cd853e05f65dd52f3b4307"  # release-service-catalog development branch, pinned
        - name: ociStorage
          value: $(params.ociStorage)
        - name: sourceDataArtifact
          value: "$(tasks.collect-data.results.sourceDataArtifact)"
        - name: trustedArtifactsDebug
          value: "$(params.trustedArtifactsDebug)"
        - name: orasOptions
          value: $(params.orasOptions)
      runAfter:
        - collect-data
    - name: check-data-keys
      params:
        - name: orasOptions
          value: $(params.orasOptions)
        - name: dataPath
          value: "$(tasks.collect-data.results.data)"
        - name: schema
          value: https://github.com/konflux-ci/release-service-catalog/raw/37605e1fe41aae2794cd853e05f65dd52f3b4307/schema/dataKeys.json
        - name: systems
          value: |
            [
              {"systemName": "mapping", "dynamic": false}
            ]
        - name: ociStorage
          value: $(params.ociStorage)
        - name: sourceDataArtifact
          value: "$(tasks.collect-data.results.sourceDataArtifact)"
        - name: dataDir
          value: $(params.dataDir)
        - name: trustedArtifactsDebug
          value: "$(params.trustedArtifactsDebug)"
        - name: taskGitUrl
          value: "https://github.com/konflux-ci/release-service-catalog"
        - name: taskGitRevision
          value: "37605e1fe41aae2794cd853e05f65dd52f3b4307"  # release-service-catalog development branch, pinned
      taskRef:
        params:
          - name: url
            value: https://github.com/konflux-ci/release-service-catalog
          - name: revision
            value: "37605e1fe41aae2794cd853e05f65dd52f3b4307"  # release-service-catalog development branch, pinned
          - name: pathInRepo
            value: tasks/managed/check-data-keys/check-data-keys.yaml
        resolver: git
      runAfter:
        - collect-data
    - name: reduce-snapshot
      taskRef:
        resolver: "git"
        params:
          - name: url
            value: https://github.com/konflux-ci/release-service-catalog
          - name: revision
            value: "37605e1fe41aae2794cd853e05f65dd52f3b4307"  # release-service-catalog development branch, pinned
          - name: pathInRepo
            value: tasks/managed/reduce-snapshot/reduce-snapshot.yaml
      params:
        - name: orasOptions
          value: $(params.orasOptions)
        - name: SNAPSHOT
          value: $(params.dataDir)/$(tasks.collect-data.results.snapshotSpec)
        - name: SINGLE_COMPONENT
          value: $(tasks.collect-data.results.singleComponentMode)
        - name: SINGLE_COMPONENT_CUSTOM_RESOURCE
          value: snapshot/$(tasks.collect-data.results.snapshotName)
        - name: SINGLE_COMPONENT_CUSTOM_RESOURCE_NS
          value: $(tasks.collect-data.results.snapshotNamespace)
        - name: SNAPSHOT_PATH
          value: $(params.dataDir)/$(tasks.collect-data.results.snapshotSpec)
        - name: ociStorage
          value: $(params.ociStorage)
        - name: sourceDataArtifact
          value: "$(tasks.collect-data.results.sourceDataArtifact)"
        - name: dataDir
          value: $(params.dataDir)
        - name: trustedArtifactsDebug
          value: "$(params.trustedArtifactsDebug)"
        - name: taskGitUrl
          value: "https://github.com/konflux-ci/release-service-catalog"
        - name: taskGitRevision
          value: "37605e1fe41aae2794cd853e05f65dd52f3b4307"  # release-service-catalog development branch, pinned
      runAfter:
        - collect-data
    - name: apply-mapping
      retries: 3
      taskRef:
        resolver: "git"
        params:
          - name: url
            value: $(params.taskGitUrl)
          - name: revision
            value: $(params.taskGitRevision)
          - name: pathInRepo
            value: managed-context/tasks/apply-mapping/apply-mapping.yaml
      params:
        - name: orasOptions
          value: $(params.orasOptions)
        - name: failOnEmptyResult
          value: "true"
        - name: dataPath
          value: "$(tasks.collect-data.results.data)"
        - name: snapshotPath
          value: "$(tasks.collect-data.results.snapshotSpec)"
        - name: ociStorage
          value: $(params.ociStorage)
        - name: sourceDataArtifact
          value: "$(tasks.reduce-snapshot.results.sourceDataArtifact)"
        - name: dataDir
          value: $(params.dataDir)
        - name: trustedArtifactsDebug
          value: "$(params.trustedArtifactsDebug)"
        - name: taskGitUrl
          value: "https://github.com/konflux-ci/release-service-catalog"
        - name: taskGitRevision
          value: "37605e1fe41aae2794cd853e05f65dd52f3b4307"  # release-service-catalog development branch, pinned
      runAfter:
        - reduce-snapshot
    - name: verify-conforma
      timeout: "4h00m0s"
      taskRef:
        resolver: "git"
        params:
          - name: url
            value: $(params.taskGitUrl)
          - name: revision
            value: $(params.taskGitRevision)
          - name: pathInRepo
            value: "managed-context/tasks/verify-conforma/0.1/verify-conforma-vsa.yaml"
      params:
        - name: ORAS_OPTIONS
          value: $(params.orasOptions)
        - name: SNAPSHOT_FILENAME
          value: "$(tasks.collect-data.results.snapshotSpec)"
        - name: SSL_CERT_DIR
          value: /var/run/secrets/kubernetes.io/serviceaccount
        - name: POLICY_CONFIGURATION
          value: $(params.enterpriseContractPolicy)
        - name: STRICT
          # only set to false for development
          value: "true"
        - name: REKOR_HOST
          value: "$(params.rekorHost)"
        - name: TUF_MIRROR
          value: "$(params.tufMirror)"
        - name: IGNORE_REKOR
          value: "false"
        - name: CERTIFICATE_IDENTITY
          value: "$(params.certificateIdentity)"
        - name: CERTIFICATE_OIDC_ISSUER
          value: "$(params.certificateOidcIssuer)"
        - name: EXTRA_RULE_DATA
          value: $(params.enterpriseContractExtraRuleData)
        - name: TIMEOUT
          value: "$(tasks.collect-task-params.results.extractedValues[1])"
        - name: WORKERS
          value: "$(tasks.collect-task-params.results.extractedValues[0])"
        - name: SOURCE_DATA_ARTIFACT
          value: "$(tasks.apply-mapping.results.sourceDataArtifact)"
        - name: TRUSTED_ARTIFACTS_DEBUG
          value: "$(params.trustedArtifactsDebug)"
        - name: TRUSTED_ARTIFACTS_EXTRACT_DIR
          value: "$(params.dataDir)"
        - name: CA_TRUST_CONFIGMAP_NAME
          value: "trusted-ca"
        - name: CA_TRUST_CONFIG_MAP_KEY
          value: "ca-bundle.crt"
        - name: ENABLE_VSA
          value: "true"
        - name: ATTESTATION_FORMAT
          value: "predicate"
        - name: VSA_SIGNING_KEY
          value: "k8s://managed-tenant/release-signing-key"
        - name: VSA_UPLOAD
          value: "local@$(params.dataDir)/vsa"
        - name: ociStorage
          value: $(params.ociStorage)
        - name: taskGitUrl
          value: "https://github.com/konflux-ci/release-service-catalog"
        - name: taskGitRevision
          value: "37605e1fe41aae2794cd853e05f65dd52f3b4307"  # release-service-catalog development branch, pinned
      runAfter:
        - apply-mapping
        - collect-task-params
    - name: push-snapshot
      retries: 5
      when:
        - input: "$(tasks.apply-mapping.results.mapped)"
          operator: in
          values: ["true"]
      taskRef:
        resolver: "git"
        params:
          - name: url
            value: https://github.com/konflux-ci/release-service-catalog
          - name: revision
            value: "37605e1fe41aae2794cd853e05f65dd52f3b4307"  # release-service-catalog development branch, pinned
          - name: pathInRepo
            value: tasks/managed/push-snapshot/push-snapshot.yaml
      params:
        - name: orasOptions
          value: $(params.orasOptions)
        - name: snapshotPath
          value: "$(tasks.collect-data.results.snapshotSpec)"
        - name: dataPath
          value: "$(tasks.collect-data.results.data)"
        - name: resultsDirPath
          value: "$(tasks.collect-data.results.resultsDir)"
        - name: ociStorage
          value: $(params.ociStorage)
        - name: sourceDataArtifact
          value: "$(tasks.verify-conforma.results.sourceDataArtifact)"
        - name: dataDir
          value: $(params.dataDir)
        - name: trustedArtifactsDebug
          value: "$(params.trustedArtifactsDebug)"
        - name: taskGitUrl
          value: "https://github.com/konflux-ci/release-service-catalog"
        - name: taskGitRevision
          value: "37605e1fe41aae2794cd853e05f65dd52f3b4307"  # release-service-catalog development branch, pinned
      runAfter:
        - verify-conforma
        - check-data-keys
    - name: attach-vsa
      when:
        - input: "$(tasks.verify-conforma.results.VSA_GENERATED)"
          operator: in
          values: ["true"]
        - input: "$(tasks.apply-mapping.results.mapped)"
          operator: in
          values: ["true"]
      taskRef:
        resolver: "git"
        params:
          - name: url
            value: $(params.taskGitUrl)
          - name: revision
            value: $(params.taskGitRevision)
          - name: pathInRepo
            value: "managed-context/tasks/attach-vsa/0.1/attach-vsa.yaml"
      params:
        - name: SNAPSHOT_FILENAME
          value: "$(tasks.collect-data.results.snapshotSpec)"
        - name: SOURCE_DATA_ARTIFACT
          value: "$(tasks.push-snapshot.results.sourceDataArtifact)"
        - name: VSA_GENERATED
          value: "$(tasks.verify-conforma.results.VSA_GENERATED)"
        - name: VSA_SIGNING_KEY
          value: "k8s://managed-tenant/release-signing-key"
        - name: ORAS_OPTIONS
          value: $(params.orasOptions)
        - name: TRUSTED_ARTIFACTS_DEBUG
          value: "$(params.trustedArtifactsDebug)"
        - name: TRUSTED_ARTIFACTS_EXTRACT_DIR
          value: "/var/workdir/attach-vsa"
        - name: HOMEDIR
          value: "/var/workdir/attach-vsa"
        - name: SSL_CERT_DIR
          value: /var/run/secrets/kubernetes.io/serviceaccount
        - name: CA_TRUST_CONFIGMAP_NAME
          value: "trusted-ca"
        - name: CA_TRUST_CONFIG_MAP_KEY
          value: "ca-bundle.crt"
        - name: BASE_IMAGE_BUILDER_ID
          value: "$(params.baseImageBuilderId)"
      runAfter:
        - push-snapshot
    - name: update-cr-status
      params:
        - name: orasOptions
          value: $(params.orasOptions)
        - name: resource
          value: $(params.release)
        - name: resultsDirPath
          value: $(tasks.collect-data.results.resultsDir)
        - name: ociStorage
          value: $(params.ociStorage)
        - name: resultArtifacts
          value:
            - "$(tasks.push-snapshot.results.sourceDataArtifact)=$(params.dataDir)"
        - name: dataDir
          value: $(params.dataDir)
        - name: trustedArtifactsDebug
          value: "$(params.trustedArtifactsDebug)"
        - name: taskGitUrl
          value: "https://github.com/konflux-ci/release-service-catalog"
        - name: taskGitRevision
          value: "37605e1fe41aae2794cd853e05f65dd52f3b4307"  # release-service-catalog development branch, pinned
      taskRef:
        resolver: "git"
        params:
          - name: url
            value: https://github.com/konflux-ci/release-service-catalog
          - name: revision
            value: "37605e1fe41aae2794cd853e05f65dd52f3b4307"  # release-service-catalog development branch, pinned
          - name: pathInRepo
            value: tasks/managed/update-cr-status/update-cr-status.yaml
      runAfter:
        - attach-vsa
