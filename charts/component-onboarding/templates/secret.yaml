{{- if .Values.customContainerImage }}
{{- $componentName := .Values.componentName }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ $componentName }}-pull-secret
  namespace: {{ .Values.namespace }}
type: kubernetes.io/dockerconfigjson
data:
  .dockerconfigjson: {{ .Values.dockerconfigjson }}
{{- end }}
