apiVersion: appstudio.redhat.com/v1alpha1
kind: Component
metadata:
  name: {{ .Values.applicationName }}
  namespace: {{ .Values.namespace }}
  annotations:
    build.appstudio.openshift.io/request: "configure-pac"
{{- if .Values.hermetic }}
    build.appstudio.openshift.io/hermetic: "true"
{{- end }}
{{- if .Values.buildPipeline }}
    build.appstudio.openshift.io/pipeline: {{ .Values.buildPipeline | toJson | quote }}
{{- end }}
{{- if .Values.image.generateRepository }}
    image.redhat.com/generate: '{"visibility": "public"}'
{{- end }}
spec:
  componentName: {{ .Values.applicationName }}
  application: {{ .Values.applicationName }}
{{- if not .Values.image.generateRepository }}
  containerImage: {{ .Values.customContainerImage | default .Values.containerImage }}
{{- end }}
{{- if .Values.customContainerImage }}
  secret: {{ .Values.applicationName }}-pull-secret
{{- end }}
  source:
    git:
      url: {{ .Values.gitRepoUrl }}
      revision: {{ .Values.gitRevision }}
      context: {{ .Values.gitContext }}
