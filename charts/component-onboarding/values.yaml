# Default values for component-onboarding
# Onboard a component/repository to Konflux - repeatable per component

# Repository URL for slsa-konflux-example (used for pipelines)
# This should match the repositoryUrl in platform-config
repositoryUrl: "https://github.com/arewm/slsa-konflux-example"

# Name of the component to onboard
componentName: ""

# Name of the application (defaults to componentName)
applicationName: ""

# Git repository URL for the component
gitRepoUrl: ""

# Namespace configuration
# IMPORTANT: These values must match the platform-config chart installation
namespace: "default-tenant"

# Optional: Git revision/branch to track (defaults to main)
gitRevision: "main"

# Integration test configuration
integrationTest:
  # Pinned revision of konflux-ci/build-definitions for the enterprise-contract pipeline
  # renovate: datasource=git-refs depName=https://github.com/konflux-ci/build-definitions
  revision: "890952c6ab97e0c3a6bd927909925db542650398"

# Optional: Context directory in the repository
gitContext: "."

# Optional: Application display name (if different from componentName)
displayName: ""

# Optional: Build pipeline configuration
# When set, the Component annotation will select this pipeline instead of the cluster default
# Example:
#   buildPipeline:
#     name: slsa-e2e-oci-ta
#     bundle: "quay.io/slsa-konflux-example/pipeline-slsa-e2e-oci-ta:latest@sha256:..."
buildPipeline: {}

# Optional: Container image for the component
# Defaults to registry-service.kind-registry/konflux-{componentName}:latest when empty
# Override for custom registries or image names
containerImage: ""

# Optional: Custom container image URL (overrides containerImage default)
# When set, you must provide dockerconfigjson for authentication
customContainerImage: ""

# Optional: Docker config JSON for custom container image authentication
# Required when customContainerImage is set
# This should be the base64-encoded .dockerconfigjson content
# Example: eyJhdXRocyI6eyJyZWdpc3RyeS5leGFtcGxlLmNvbSI6eyJ1c2VybmFtZSI6InVzZXIiLCJwYXNzd29yZCI6InBhc3MiLCJhdXRoIjoiZFhObGNqcHdZWE56In19fQ==
dockerconfigjson: ""

# Image repository configuration
image:
  # Generate ImageRepository via image-controller (requires image-controller to be deployed)
  # Set to true to trigger automatic Quay repository and credential creation
  # Default: false (use manually specified containerImage)
  generateRepository: false

# Release configuration
release:
  # Target namespace for ReleasePlanAdmission and EnterpriseContractPolicy
  # IMPORTANT: Must match platform-config chart installation
  targetNamespace: "managed-tenant"

  # Author for automated releases
  # This is required for automated releases to pass validation
  # Default: user1
  author: "user1"

  # Optional: Release destination registry
  # This is where the component will be pushed after release
  # If not set, defaults to registry-service.kind-registry/released-{componentName}
  destination: ""

  # Optional: Environment name for the release
  # Default: production
  environment: "production"

  # Enterprise Contract policy name suffix (created per-application in this chart)
  # Full name will be "{componentName}-{policyName}" (or "{applicationName}-{policyName}" if applicationName is set)
  policyName: "ec-policy"

  signing:
    # Public key for verifying Tekton Chains signatures on build provenance.
    # Set to a cosign key reference (e.g. "k8s://tekton-pipelines/public-key")
    # when using keypair-based Chains signing. Leave empty (default) for
    # keyless signing via Sigstore/Fulcio, where Conforma verifies against
    # the Rekor transparency log instead.
    publicKey: ""

  # Enterprise Contract policy configuration
  policy:
    # Policy OCI bundle reference
    policyBundle: "quay.io/conforma/release-policy:konflux@sha256:1b296a925b4021f4b4959ea289596925a8735540e554f3ba7754a651731a216f"

    # Policy data source (defaults to managed-context/policies/ec-policy-data/data in repositoryUrl)
    policyData: ""

    # Acceptable bundles data source
    acceptableBundles: "oci::quay.io/slsa-konflux-example/slsa-e2e-data-acceptable-bundles:latest@sha256:0a9969f7d2b5e1b85b9152c92fe44ed8b442196802b1fa09fe5dead3557bc28b"

    # EC policy collections to include
    policyCollections:
      - "minimal"
      - "slsa3"

    # SLSA source level requirement (1, 2, or 3)
    slsaSourceMinLevel: "1"

    # Block releases on unpatched CVEs at these severity levels
    # By default, unpatched CVEs (no known fix) are warnings only.
    # Set to ["critical", "high"] to block releases on unpatched high/critical CVEs.
    # Example: ["critical", "high"]
    restrictUnpatchedCveLevels: []

    # Policy rules to exclude (e.g., per-CVE exceptions)
    # Example: ["cve.cve_blockers:CVE-2026-4878"]
    excludeRules: []

    # Volatile (time-bounded) rule exclusions
    # Example:
    #   volatileExcludes:
    #     - value: "cve.cve_blockers:CVE-2026-4878"
    #       effectiveUntil: "2026-06-01T00:00:00Z"
    #       reference: "https://issues.example.com/VULN-1234"
    volatileExcludes: []

  # Service account for release pipeline
  # IMPORTANT: Must match platform-config chart installation
  serviceAccount: "release-service-account"

  # Pipeline configuration
  # IMPORTANT: These should match platform-config for consistency
  pipeline:
    # Git repository URL for the pipeline
    # Defaults to .Values.repositoryUrl
    url: ""

    # Git revision/branch for the pipeline
    # Default: main
    revision: "main"

    # Path to the pipeline YAML in the repository
    # Default: managed-context/pipelines/slsa-e2e-release/slsa-e2e-release.yaml
    pathInRepo: "managed-context/pipelines/slsa-e2e-release/slsa-e2e-release.yaml"

  # Trusted artifacts configuration
  # IMPORTANT: Must match platform-config chart installation
  trustedArtifacts:
    # OCI repository for storing trusted artifacts
    # Default: registry-service.kind-registry/trusted-artifacts
    ociStorage: "registry-service.kind-registry/trusted-artifacts"
