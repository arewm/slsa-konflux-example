---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: namespace-labeler
  namespace: default
  annotations:
    "helm.sh/hook": pre-install,pre-upgrade
    "helm.sh/hook-weight": "-10"
    "helm.sh/hook-delete-policy": before-hook-creation,hook-succeeded
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: namespace-labeler
  annotations:
    "helm.sh/hook": pre-install,pre-upgrade
    "helm.sh/hook-weight": "-10"
    "helm.sh/hook-delete-policy": before-hook-creation,hook-succeeded
rules:
- apiGroups: [""]
  resources: ["namespaces"]
  verbs: ["get", "patch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: namespace-labeler
  annotations:
    "helm.sh/hook": pre-install,pre-upgrade
    "helm.sh/hook-weight": "-10"
    "helm.sh/hook-delete-policy": before-hook-creation,hook-succeeded
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: namespace-labeler
subjects:
- kind: ServiceAccount
  name: namespace-labeler
  namespace: default
---
apiVersion: batch/v1
kind: Job
metadata:
  name: namespace-label
  namespace: default
  annotations:
    "helm.sh/hook": pre-install,pre-upgrade
    "helm.sh/hook-weight": "-5"
    "helm.sh/hook-delete-policy": hook-succeeded
spec:
  template:
    metadata:
      name: namespace-label
    spec:
      serviceAccountName: namespace-labeler
      restartPolicy: Never
      containers:
      - name: label
        image: docker.io/alpine/k8s:1.32.3
        command:
        - /bin/sh
        - -c
        - |
          set -euo pipefail

          {{- range .Values.namespaces }}
          kubectl label namespace {{ . }} trusted-tasks-enabled=true --overwrite
          {{- end }}
